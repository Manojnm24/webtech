<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marquee</title>
</head>
<body>
    <h1>sliding text</h1>
    <h1>
        <marquee behavior="alternate" direction="right" scrollamount="20" bgcolor="orange"  loop="5">
            IND..!
        </marquee>
    </h1>
    <h1>
        <marquee behavior="scroll" direction="right" scrollamount="20" bgcolor="white" loop="5" textcolor="blue">
            IND..!
        </marquee>
    </h1>
    <h1>
        <marquee behavior="slide" direction="right" scrollamount="20" bgcolor="green" loop="5">
            IND..!
        </marquee>
    </h1>
    <marquee behavior="" direction="" scrollamount="50">
        <img src="https://images.pexels.com/photos/30596249/pexels-photo-30596249.jpeg" alt="earth pic" width="300px"
            height="300px" border="2px solid black">
    </marquee>
</body>
</html>
