<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student form</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Student Registration Form</legend>

            <table>
                <tr>
                    <td><label for="fname">First Name</label></td>
                    <td><input type="text" id="fname" name="fname"></td>
                </tr>
                <tr>
                    <td>
                        <label for="lname">Last Name</label>
                    </td>
                    <td>
                        <input type="text" id="lname" name="">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="dob">Date of Birth</label>
                    </td>
                    <td>
                        <input type="date" id="dob" name="dob">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="email">Email ID</label>
                    </td>
                    <td>
                        <input type="email" id="email" name="email">
                    </td>

                </tr>
                <tr>
                    <td>
                        <label for="gender">Gender</label>
                    </td>
                    <td>
                        <input type="radio" value="Male" name="gender" id="gender">Male
                        <input type="radio" value="female" name="gender">Female
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="add">Address</label>
                    </td>
                    <td>
                        <textarea name="address" id="add"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="city">City</label>
                    </td>
                    <td>
                        <input type="text" name="city" id="city">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="code">Pin Code</label>
                    </td>
                    <td>
                        <input type="number" id="code" name="pincode">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="state">State</label>
                    </td>
                    <td>
                        <input type="text" id="state" name="state">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="country">Country</label>
                    </td>
                    <td>
                        <input type="text" name="country" id="country">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="hob">Hobbies</label>
                    </td>
                    <td>
                        Drawing<input type="checkbox" value="Drawing" name="drawing" id="hob">
                        Singing<input type="checkbox" value="singing" name="singing" id="hob">
                        Sketching<input type="checkbox" value="sketching" name="Sketching" id="hob">
                        Dancing<input type="checkbox" value="Dancing" name="Dancing" id="hob">
                        <br>
                        Others<input type="checkbox" value="others" name="others" id="hob">
                        <input type="text">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="qul">Qulification</label>
                    </td>
                    <td>
                        <table>
                            <thead>
                                <th>
                                    SI.NO
                                </th>
                                <th>Board</th>
                                <th>Percentage</th>
                                <th>Year of Passing</th>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <label for="classx">Class X</label>
                                    </td>
                                    <td>
                                        <input type="text" id="classx" name="classx">
                                        <input type="text">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </td>
                </tr>
            </table>

        </fieldset>
    </form>
</body>
</html>
