<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Time Table</title>
</head>

<body>

    <center><h1><u>Time Table Schedule</u></h1></center>

    <table border="10" cellpadding="5" cellspacing="10" bgcolor="lightyellow" align="center" width="50%">
        <thead>
            <tr>
                <th rowspan="3" bgcolor="lightblue">Day</th>
                <th colspan="3" bgcolor="lightblue">Seminar</th>
            </tr>
            <tr>
                <th colspan="2">Schedule</th>
                <th rowspan="2">Topic</th>
            </tr>
            <tr>
                <th>Begin</th>
                <th>End</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Monday</td>
                <td rowspan="2">10:00 a.m.</td>
                <td rowspan="2">3:00 p.m.</td>
                <td>Introduction to HTML</td>
            </tr>
            <tr>
                <td>Core Java</td>
            </tr>

            <tr>
                <td rowspan="3">Tuesday</td>
                <td>10:00 a.m.</td>
                <td>12:00 p.m.</td>
                <td rowspan="2">Web tech</td>
            </tr>
            <tr>
                <td>1:00 p.m.</td>
                <td>3:00 p.m.</td>
            </tr>
            <tr>
                <td>4:00 p.m.</td>
                <td>5:00 p.m.</td>
                <td>Core Java</td>
            </tr>

            <tr>
                <td>Wednesday</td>
                <td>10:00 a.m.</td>
                <td>11:30 p.m.</td>
                <td>APTI</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
